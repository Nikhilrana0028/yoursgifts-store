<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yours Gift Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f3f3f3;}
header{background:#131921;color:#fff;padding:10px 15px;display:flex;align-items:center;gap:15px;}
.logo{font-size:20px;font-weight:bold;color:#ff9900;}
.search{flex:1;padding:8px;border-radius:5px;border:none;}
.categories{display:flex;gap:10px;padding:10px;background:#fff;overflow-x:auto;}
.cat{padding:6px 12px;background:#eee;border-radius:20px;cursor:pointer;font-size:14px;white-space:nowrap;}
.cat.active{background:#ff9900;color:#000;}
.container{padding:15px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;}
.card{background:#fff;border-radius:10px;padding:10px;box-shadow:0 5px 10px rgba(0,0,0,0.1);} 
.card img{width:100%;height:180px;object-fit:cover;border-radius:8px;}
.price{color:#e63946;font-weight:bold;}
button{width:100%;padding:8px;background:#ff9900;border:none;border-radius:5px;margin-top:8px;cursor:pointer;}
.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;color:#fff;border-radius:50%;width:60px;height:60px;display:flex;align-items:center;justify-content:center;font-size:28px;text-decoration:none;}
</style>
</head>
<body>

<header>
<div class="logo">Yours Gift Store</div>
<input type="text" id="search" class="search" placeholder="Search gifts..." onkeyup="showProducts()">
</header>

<div class="categories" id="categories">
<div class="cat active" onclick="setCategory('All')">All</div>
<div class="cat" onclick="setCategory('Birthday')">Birthday</div>
<div class="cat" onclick="setCategory('Anniversary')">Anniversary</div>
<div class="cat" onclick="setCategory('Valentine')">Valentine</div>
<div class="cat" onclick="setCategory('MotherDay')">Mother Day</div>
<div class="cat" onclick="setCategory('FatherDay')">Father Day</div>
<div class="cat" onclick="setCategory('Teacher')">Teacher</div>
<div class="cat" onclick="setCategory('Doctor')">Doctor</div>
</div>

<div class="container">
<div class="grid" id="productList"></div>
</div>

<!-- WhatsApp Floating Button -->
<a class="whatsapp" href="https://wa.me/7669541761" target="_blank">💬</a>

<script>
let selectedCategory="All";

// 👉 ADMIN: yahan manually products add karo
let products=[
{
name:"Frame Gift",
price:"499",
category:"Birthday",
image:"https://i.ibb.co/jPtLR1fM/frame.jpg"
}
{name:"Anniversary Gift",price:"699",category:"Anniversary",image:"https://via.placeholder.com/300"},
{name:"Doctor Gift",price:"399",category:"Doctor",image:"https://via.placeholder.com/300"}
];

function setCategory(cat){
selectedCategory=cat;
document.querySelectorAll('.cat').forEach(c=>c.classList.remove('active'));
event.target.classList.add('active');
showProducts();
}

function showProducts(){
let container=document.getElementById('productList');
let search=document.getElementById('search').value.toLowerCase();
container.innerHTML="";

products.forEach((p,i)=>{
if((p.name.toLowerCase().includes(search)) && (selectedCategory==='All'||p.category===selectedCategory)){
container.innerHTML+=`
<div class="card">
<img src="${p.image}"/>
<h4>${p.name}</h4>
<p>${p.category}</p>
<p class="price">₹${p.price}</p>
<button onclick="order(${i})">Order on WhatsApp</button>
</div>`;
}
});
}

function order(i){
let p=products[i];
let phone="7669541761";
let msg=`Hello, I want to order:\nProduct: ${p.name}\nCategory: ${p.category}\nPrice: ₹${p.price}`;
let url=`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
window.open(url,'_blank');
}

showProducts();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yours Gift Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f3f3f3;}
header{background:#131921;color:#fff;padding:15px;text-align:center;font-size:24px;font-weight:600;}
.container{padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{background:#fff;border-radius:10px;padding:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1);transition:0.3s;}
.card:hover{transform:scale(1.05);} 
.card img{width:100%;height:200px;object-fit:cover;border-radius:8px;}
.card h3{margin:10px 0 5px;}
.price{color:#e63946;font-weight:bold;font-size:18px;}
button{width:100%;padding:10px;background:#ff9900;border:none;border-radius:5px;color:#000;font-weight:bold;cursor:pointer;margin-top:10px;}
button:hover{background:#f77f00;}
</style>
</head>
<body>
<header>🛍️ Yours Gift Store</header>

<div class="container">
<div class="grid" id="productList"></div>
</div>

<script>
// 👉 ADMIN SECTION (yahan tum products add karoge)
let products = [
{
name:"Custom Photo Frame",
price:"499",
desc:"High quality customized frame",
image:"https://via.placeholder.com/300"
},
{
name:"Magic Mug",
price:"299",
desc:"Heat sensitive photo mug",
image:"https://via.placeholder.com/300"
}
];

function showProducts(){
let container=document.getElementById('productList');
container.innerHTML="";
products.forEach((p,i)=>{
container.innerHTML+=`
<div class="card">
<img src="${p.image}"/>
<h3>${p.name}</h3>
<p>${p.desc}</p>
<p class="price">₹${p.price}</p>
<button onclick="order(${i})">Order on WhatsApp</button>
</div>`;
});
}

function order(i){
let p=products[i];
let phone="7669541761"; // अपना नंबर डालो
let msg=`Hello, I want to order:\nProduct: ${p.name}\nPrice: ₹${p.price}`;
let url=`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
window.open(url,'_blank');
}

showProducts();
</script>

</body>
</html>

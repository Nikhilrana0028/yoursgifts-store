<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yours Gift Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body {font-family:'Poppins',sans-serif;margin:0;background:linear-gradient(135deg,#ff9a9e,#fad0c4);} 
header {background:#000;color:#fff;text-align:center;padding:20px;} 
.container {padding:20px;} 
.product {background:#fff;border-radius:15px;padding:15px;margin:15px 0;box-shadow:0 8px 20px rgba(0,0,0,0.2);} 
.product img {width:100%;height:200px;object-fit:cover;border-radius:10px;} 
button {padding:10px;background:#ff4d6d;color:#fff;border:none;border-radius:8px;cursor:pointer;} 
</style>
</head>
<body>
<header>
<h1><span style="color:#ff4d6d">Yours</span> <span style="color:#fff">Gift</span> <span style="color:#ffd166">Store</span></h1>
<p>✨ Personalized With Love ✨</p>
</header>

<div class="container">
<h2>Our Products</h2>
<div id="list"></div>
</div>

<script>
// 🔒 ADMIN ONLY PRODUCTS (yahan tum manually add karoge)
let products = [
  {
    name: "Birthday Frame",
    price: "499",
    desc: "Custom photo birthday frame",
    image: "https://via.placeholder.com/300"
  },
  {
    name: "Anniversary Gift",
    price: "699",
    desc: "Couple special gift",
    image: "https://via.placeholder.com/300"
  }
];

function showProducts(){
 let list = document.getElementById('list');
 list.innerHTML = '';

 products.forEach((p, i)=>{
 list.innerHTML += `
 <div class="product">
 <img src="${p.image}" />
 <h3>${p.name}</h3>
 <p>${p.desc}</p>
 <p><b>₹${p.price}</b></p>
 <button onclick="order(${i})">Order on WhatsApp</button>
 </div>`;
 });
}

function order(i){
 let product = products[i];
 let phone = "91XXXXXXXXXX"; // apna number daalo

 let message = `Hello, I want to order:\nProduct: ${product.name}\nPrice: ₹${product.price}`;
 let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
 window.open(url, '_blank');
}

showProducts();
</script>

</body>
</html>
